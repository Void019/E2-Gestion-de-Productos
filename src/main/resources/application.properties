spring.application.name=techstore-api
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/techstore}
spring.datasource.username=${DB_USERNAME:techstore}
spring.datasource.password=${DB_PASSWORD:techstore}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.security.username=${APP_SECURITY_USERNAME:admin}
app.security.password=${APP_SECURITY_PASSWORD:Admin12345}

jwt.secret=${JWT_SECRET:techstore-secret-key-techstore-secret-key-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
