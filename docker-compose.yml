services:
  postgres:
    image: postgres:16-alpine
    container_name: techstore_db
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
    ports:
      - "5432:5432"
    volumes:
      - techstore_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techstore -d techstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  microservicio:
    build: .
    container_name: techstore_api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/techstore
      DB_USERNAME: techstore
      DB_PASSWORD: techstore
      APP_SECURITY_USERNAME: ${APP_SECURITY_USERNAME:-admin@techstore.cl}
      APP_SECURITY_PASSWORD: Admin12345
      JWT_SECRET: techstore-secret-key-techstore-secret-key-2026
      JWT_EXPIRATION_MS: 3600000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AUDIT_QUEUE_URL: ${AUDIT_QUEUE_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  techstore_postgres_data:
